name: Release

# Thin caller for the shared scientist-labs/rust-gem-release reusable workflow (pinned
# @v0, a moving major). It owns only what a reusable (on: workflow_call) workflow cannot:
# the tag trigger, the contents:write token grant, and clusterkit's per-gem inputs.
#
# Release procedure (the tag drives it; a CI-created tag would not re-trigger):
#   1. bump lib/clusterkit/version.rb
#   2. git commit -am "Release X.Y.Z"
#   3. git tag X.Y.Z && git push origin HEAD --tags
#
# On workflow_dispatch, publish defaults to FALSE = dry-run (builds, no RubyGems push).
# On a tag push, publish is true but the RubyGems push is still token-gated: an empty
# RUBYGEMS_API_KEY secret makes the push step a safe no-op.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"        # release:    0.2.6
      - "[0-9]+.[0-9]+.[0-9]+.*"      # prerelease: 0.2.6.pre (bare-numeric form)
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+.*"     # v-prefixed prerelease: v0.2.6.pre
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: false
        description: "push to RubyGems (default off = dry-run)"
  # A PR labeled `dry-run-release` runs the full precompiled release matrix as a
  # publish=false dry-run, validating the real pipeline (cross-gem + fat-gem
  # assembly + the system-OpenBLAS linux legs) pre-merge. A reusable workflow is
  # branch-only, so workflow_dispatch cannot reach it — the label is the only
  # pre-merge lever.
  pull_request:
    types: [opened, synchronize, reopened, labeled]

# A reusable workflow can only REDUCE the inherited token scope, never elevate it — so
# the caller MUST grant contents: write here (and the repo's default workflow token must
# not be read-only) or `gh release create` 403s.
permissions:
  contents: write

jobs:
  release:
    # Normal PRs skip the expensive matrix; only a `dry-run-release` label opts in.
    # Tag pushes and manual dispatch always run.
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'dry-run-release') }}
    uses: scientist-labs/rust-gem-release/.github/workflows/release.yml@0.9.0
    with:
      # gem-name == ext-name == gemspec basename == lib subdir == Cargo package name ==
      # "clusterkit", so ext-name / gemspec / platform-gem-env all use the defaults.
      gem-name: clusterkit
      version-command: ruby -r./lib/clusterkit/version -e 'print ClusterKit::VERSION'
      # Publish only on tag push, or on a manual dispatch that explicitly opts in.
      # Every PR (dry-run-release matrix) stays publish=false.
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
      # FULL linux precompiled support. clusterkit links BLAS/LAPACK; ext/clusterkit/
      # extconf.rb selects the `openblas-system` Cargo feature on linux (committed in
      # this PR) so it links the SYSTEM OpenBLAS instead of compiling it from source.
      # The inline cross image stages the BLAS libs for BOTH target arches: the x86_64
      # leg uses the amd64 libs; the aarch64 leg needs the arm64 (multiarch) libs under
      # /usr/lib/aarch64-linux-gnu, which requires dpkg --add-architecture arm64 + the
      # ubuntu-ports arm64 apt source (the base is amd64-only ubuntu focal).
      linux-image-setup: >-
        sed -i 's|^deb http|deb [arch=amd64] http|g' /etc/apt/sources.list &&
        dpkg --add-architecture arm64 &&
        printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal main universe\ndeb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal-updates main universe\n' > /etc/apt/sources.list.d/arm64.list &&
        apt-get update &&
        apt-get install -y --no-install-recommends gfortran pkg-config libopenblas-dev liblapack-dev libssl-dev zlib1g-dev libopenblas-dev:arm64 liblapack-dev:arm64 libssl-dev:arm64 zlib1g-dev:arm64
      # For the aarch64 cross build, point pkg-config at the arm64 .pc files and allow
      # cross so openblas-src resolves the arm64 OpenBLAS, not the host amd64 one.
      aarch64-cargo-config: |
        [env]
        PKG_CONFIG_ALLOW_CROSS = "1"
        PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"
        PKG_CONFIG_LIBDIR = "/usr/lib/aarch64-linux-gnu/pkgconfig"
      build-darwin: true
      build-x86_64-linux: true
      build-aarch64-linux: true
    secrets:
      # required: false in the shared workflow — an empty secret yields a clean skip of
      # the RubyGems push instead of a hard error.
      rubygems-api-key: ${{ secrets.RUBYGEMS_API_KEY }}
